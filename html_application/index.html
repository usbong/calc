<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
  </head>

  <title>
    Usbong Calculator 2026
  </title>

  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

  <style type="text/css">
		html, body
        {
            font-family: Arial;
			font-size: 11pt;

			width: 100%;
			height: 100%;

			background-color: black; /*white; transparent*/
			border: none;

			padding: 0;
			margin: 0;

			-webkit-user-select: none; /* Safari */
			-ms-user-select: none; /* IE 10 and IE 11 */
			user-select: none; /* Standard syntax */

			/* added by Mike, 20221012 */
			transform: scale(1.0);

			/* added by Mike, 20221119 */
			touch-action: none;
		}

		canvas.myCanvas {
			position: absolute;

			padding: 0;
			margin: auto;
			display: block;

			width: 640px;
			height: 360px;

			visibility: hidden;

			border: 0px;

			z-index: -1;
		}
		
		input.inputAnswer
        {
			width: 216px;
			height: 40px;
			
			margin-top: 2px;
			margin-bottom: 4px;
		
			font-family: Arial;
			font-size: 20pt;

			text-align: right;
        }

		button.buttonBackspace
		{
			width: 42px;
			height: 40px;

			padding-top: 4px;
			padding-bottom: 4px;
			
			margin-top: 2px;
			margin-bottom: 4px;

			font-family: Arial;
			font-size: 8pt;
			font-weight: bold;
		}

		button.buttonDefault
		{
			width: 40px;
			height: 40px;

			column-count: 1;
			padding-top: 4px;
			padding-bottom: 4px;

			margin-top: 2px;
			margin-bottom: 4px;

			font-family: Arial;
			font-size: 18pt;
			font-weight: bold;
		}
		
		button.buttonZero
		{
			width: 84px;
			height: 40px;

			column-count: 1;
			padding-top: 4px;
			padding-bottom: 4px;
			
			margin-top: 2px;
			margin-bottom: 4px;

			font-family: Arial;
			font-size: 18pt;
			font-weight: bold;
		}

		button.buttonEquals
		{
			width: 40px;
			height: 86px;

			column-count: 1;
			padding-top: 4px;
			padding-bottom: 4px;
			
			margin-top: -113px;
			margin-bottom: 4px;

			font-family: Arial;
			font-size: 18pt;
			font-weight: bold;
		}

  </style>

  <script>
	var sCurrOperand = "";
	var arrayOperand = [];
	var arrayOperator = [];
  
	function inputDigit(digit) {
		sCurrOperand=sCurrOperand.concat(digit);
		//alert(sCurrOperand);
	}

	function inputOperator(operator) {
		alert(operator);
		alert(sCurrOperand);
	
		arrayOperator.push(operator);
		arrayOperand.push(sCurrOperand);
		sCurrOperand="";
		
		//TODO: -add: check if parenthesis sequence is correct; 
		//otherwise, ERROR
		//note: parenthesis can also function as multiply
	}
  
  </script>

  <body id="myBodyId" onload="onLoad();">
<!--
	<canvas id="myCanvasId" class="myCanvas">
	</canvas>
-->
	<input type="tel" id="answerParam" class="inputAnswer" value="0" min="-99999" max="99999" required>
	<button class="buttonBackspace" onclick="">Back<br/>Space</button>
	
	<div>
		<div>
			<div>
				<button class="buttonDefault" onclick="inputDigit(7)">7</button>
				<button class="buttonDefault" onclick="inputDigit(8)">8</button>
				<button class="buttonDefault" onclick="inputDigit(9)">9</button>
				<button class="buttonDefault" onclick="inputOperator('/')">/</button>
				<button class="buttonDefault" onclick="inputOperator('\(')">(</button>
			</div>
			<div>
				<button class="buttonDefault" onclick="inputDigit(4)">4</button>
				<button class="buttonDefault" onclick="inputDigit(5)">5</button>
				<button class="buttonDefault" onclick="inputDigit(6)">6</button>
				<button class="buttonDefault" onclick="inputOperator('*')">*</button>
				<button class="buttonDefault" onclick="inputOperator('\)')">)</button>
			</div>
			<div>
				<button class="buttonDefault" onclick="inputDigit(1)">1</button>
				<button class="buttonDefault" onclick="inputDigit(2)">2</button>
				<button class="buttonDefault" onclick="inputDigit(3)">3</button>
				<button class="buttonDefault" onclick="inputOperator('-')">-</button>
			</div>
			<div>
				<button class="buttonZero" onclick="inputDigit(0)">0</button>
				<button class="buttonDefault" onclick="">.</button>
				<button class="buttonDefault" onclick="inputOperator('+')">+</button>
				<button class="buttonEquals" onclick="inputOperator('=')">=</button>
			</div>
		</div>
	</div>
  </body>
</html>
