	function isOperator(sInput) {
		//alert ("HERE!!: "+sInput);

		if (sInput.includes("×")) { //*
			return true;	
		}
		else if (sInput.includes("+")) {
			return true;	
		}
		else if (sInput.includes("-")) {
			return true;	
		}
		else if (sInput.includes("÷")) { ///
			return true;	
		}
		else if (sInput.includes("(")) {
			return true;	
		}
		else if (sInput.includes(")")) {
			return true;	
		}

		//alert("END!!");
		
		return false;	
	}
