  <script>
	var sCurrOperand = "";
	var arrayOperand = [];
	var arrayOperator = [];
	
	function onLoad() {
		var answerInput = document.getElementById("answerInputId");
		answerInput.value="";
	}
	
	function isOperator(sInput) {
		//alert ("HERE!!: "+sInput);

		if (sInput.includes("*")) {
			return true;	
		}
		else if (sInput.includes("+")) {
			return true;	
		}
		else if (sInput.includes("-")) {
			return true;	
		}
		else if (sInput.includes("/")) {
			return true;	
		}
		else if (sInput.includes("(")) {
			return true;	
		}
		else if (sInput.includes(")")) {
			return true;	
		}

		//alert("END!!");
		
		return false;	
	}
	
	//TODO: -update: this
	function backspace() {
		var answerInput = document.getElementById("answerInputId");
		
		//alert (">!!!");
		
		if (isOperator(answerInput.value.at(-1))) {

			//alert (">> Operator !!!");

			if (arrayOperator.length>0) {	
				arrayOperator.pop();

				sCurrOperand = answerInput.value.substring(0,answerInput.value.length-1);
			}
			
			answerInput.value = sCurrOperand;
		}
		else {

			//alert (">> Operand !!!");
			//alert(arrayOperand.length);

			sCurrDigit = answerInput.value.substring(answerInput.value.length-1,answerInput.value.length);

			//sCurrAnswerInput = answerInput.value.substring(0,answerInput.value.length-1);
			
			sCurrAnswerInput = answerInput.value;

			//alert("sCurrDigit: "+sCurrDigit);

			//alert("sCurrAnswerInput: "+sCurrAnswerInput);

			//not empty
			if (arrayOperand.length>0) {
				//alert ("DITO!!!");
			
				//sCurrOperand = arrayOperand.pop();
				sCurrOperandInArray = arrayOperand.at(-1).toString();
				//sCurrOperandInArray = arrayOperand.pop();
				
				//alert("sCurrOperandInArray: "+sCurrOperandInArray);
				//alert(sCurrOperandInArray==sCurrDigit);
				
				if (sCurrOperandInArray==sCurrDigit) {
					arrayOperand.pop();
				}
				else {
					//alert("DITO!!!");

					//check first if sCurrAnswerInput has some digits not in the operand array
					
					sCurrOperandInAnswerInput = "";
					
					if ((arrayOperator.length > 0) && (arrayOperator.at(-1)!=="=")) {
						//alert("HERE!! "+arrayOperator.at(-1));

						sCurrOperandInAnswerInput=sCurrAnswerInput.slice(-sCurrAnswerInput.lastIndexOf(arrayOperator.at(-1)))
						
						//alert ("sCurrOperandInAnswerInput: "+sCurrOperandInAnswerInput);
					}
					
					//alert (">");

					if (sCurrOperandInAnswerInput.length > 0) {
						//OK
						//alert (">> OK: "+sCurrOperandInAnswerInput);
						
						//alert("sCurrOperand: "+sCurrOperand);
						
						//answerInput = sCurrOperand;
					}
					//if none, remove the last digit of the last element in the operand array
					else {

						//alert (">> REMOVE");

						sCurrOperand = arrayOperand.pop().toString();

						//alert (">>> REMOVE: "+sCurrOperandInArray);
						
						//alert("sCurrOperandInArray.length: "+sCurrOperandInArray.length);
						
						//alert ("--: "+sCurrOperandInArray.substring(0,sCurrOperandInArray.length-1));
						
						arrayOperand.push(sCurrOperandInArray.substring(0,sCurrOperandInArray.length-1));

						//alert (">>>> REMOVE");
						
						//alert("sCurrOperand: "+sCurrOperand);
					}
/*					
alert(">>>>"+sCurrOperandInArray.substring(0,sCurrOperandInArray.length-1));
					*/					
				}
/*
				sCurrOperand = sCurrOperand.substring(0,sCurrOperand.length-1);

				sCurrAnswerInput = answerInput.value.substring(0,answerInput.value.length-1);
				
				answerInput.value = sCurrAnswerInput;
*/				
				
/*				
				answerInput.value = answerInput.value.substring(0,answerInput.value.length-sCurrOperand.length);
				
				//alert("answerInput.value: "+answerInput.value);
				
				sCurrOperand = sCurrOperand.substring(0,sCurrOperand.length-1);
				
				arrayOperand.push(sCurrOperand);
				
				//alert("AFTER sCurrOperand: "+sCurrOperand);
				
				sCurrOperand = answerInput.value+sCurrOperand;
				
				alert("AFTER sCurrOperand: "+sCurrOperand);
*/
			}
			else {
/*				
				sCurrOperand = answerInput.value.substring(0,answerInput.value.length-1);			
*/				
			}

			sCurrOperand = sCurrOperand.substring(0,sCurrOperand.length-1);

			sCurrAnswerInput = answerInput.value.substring(0,answerInput.value.length-1);
			
			answerInput.value = sCurrAnswerInput;
				
			
			//sCurrOperand = sCurrOperand.substring(0,sCurrOperand.length-1);
			
			//answerInput.value = sCurrOperand;
		}		
		//answerInput.value=answerInput.value.substring(0,answerInput.value.length-1);
		//answerInput.value = sCurrOperand;
	}
  
	function inputDigit(digit) {
		var answerInput = document.getElementById("answerInputId");
		
		if (arrayOperator.at(-1)=="=") { //peek last element
			sCurrOperand="";
			arrayOperator.pop();
			answerInput.value="";
			arrayOperator = [];
			arrayOperand = [];
		}
		
		sCurrOperand=sCurrOperand.concat(digit);
		//alert(sCurrOperand);

		answerInput.value=answerInput.value.concat(digit);
		//alert(answerInput);
	}
	
	//added by Mike, 20260429
	function reset() {
		var answerInput = document.getElementById("answerInputId");

		sCurrOperand="";
		arrayOperator.pop();
		answerInput.value="";
		arrayOperator = [];
		arrayOperand = [];
	}

	function inputOperator(sOperator) {
		var answerInput = document.getElementById("answerInputId");

		//alert(sOperator);
		//alert(sCurrOperand);
		
		//added by Mike, 20260429
		//enter an operand first
		//alert(arrayOperand.length);
		if (arrayOperand.length==0) {
			if (answerInput.value.length==0) {
				return;
			}
		}

		if (answerInput.value.includes("Err")) {
			//reset
			reset();
			
			return;
		}	
		
		//TODO: -update: to use PEMDAS
		if (!sOperator.includes("=")) {
			//if not empty
			if (arrayOperand.length>0) {
				if (arrayOperator.at(-1)=="=") { //peek last element
					arrayOperator.pop();
				}
				else {
					return;
				}
			}
		}
		
		//alert (parseFloat("00003"));
		
		//arrayOperator.push(sOperator);
		arrayOperand.push(parseFloat(sCurrOperand));
		sCurrOperand="";		
		
		if (sOperator.includes("=")) {
			//alert(arrayOperand.pop());
			var operandOne = arrayOperand.pop();
			var operandTwo = arrayOperand.pop();
			var sCurrOperator = arrayOperator.pop();

			var sAnswer = "";
			var fAnswer = 0.0;
						
			//TODO: -add: PEMDAS
			if (sCurrOperator.includes("*")) {
				//alert (operandOne);
				//alert (operandTwo);
			
				fAnswer = parseFloat(operandOne)*parseFloat(operandTwo);
				//alert(fAnswer);
				
				sAnswer = fAnswer;
				
				//alert("fAnswer: "+fAnswer);
				//alert("sAnswer: "+sAnswer);
				
				//arrayOperand.push(sAnswer);
				//alert("operand!: "+arrayOperand.at(-1));
				
				sCurrOperand=sAnswer;
				arrayOperand.push(sCurrOperand);

				arrayOperator.push("=");
			}
			else if (sCurrOperator.includes("+")) {
				fAnswer = parseFloat(operandOne)+parseFloat(operandTwo);
				sAnswer = fAnswer;
				sCurrOperand=sAnswer;
				arrayOperand.push(sCurrOperand);
				arrayOperator.push("=");
			}
			else if (sCurrOperator.includes("-")) {
				//note order of operands; reversed;
				fAnswer = -parseFloat(operandOne)+parseFloat(operandTwo);
				sAnswer = fAnswer;
				sCurrOperand=sAnswer;
				arrayOperand.push(sCurrOperand);
				arrayOperator.push("=");
			}
			else if (sCurrOperator.includes("/")) {
				//note order of operands; reversed;
				//fAnswer = parseFloat(operandOne)/parseFloat(operandTwo);
				fAnswer = parseFloat(operandTwo)/parseFloat(operandOne);
				sAnswer = fAnswer;
				sCurrOperand=sAnswer;
				arrayOperand.push(sCurrOperand);
				arrayOperator.push("=");
			}
			
			answerInput.value=sAnswer;

/*			
			//added by Mike, 20260429
			//alert (answerInput.value);
		
			if (answerInput.value.includes("NaN")) {
				answerInput.value = "Err"; //Error
				
				//reset
				sCurrOperand="";
				arrayOperator.pop();
				//answerInput.value="";
				arrayOperator = [];
				arrayOperand = [];
			}
			
			//alert("HALLO!: "+arrayOperator.pop());

			return;
*/			
		}
		else {
			//alert ("DITO!!: "+sOperator);
		
			arrayOperator.push(sOperator);
			
			answerInput.value=answerInput.value.concat(""+sOperator);
			
			//alert("answerInput: "+answerInput);
		}
	
		//added by Mike, 20260429
		//alert (answerInput.value);
	
		if (answerInput.value.includes("NaN")) {
			//reset
			reset();
/*
			sCurrOperand="";
			arrayOperator.pop();
			//answerInput.value="";
			arrayOperator = [];
			arrayOperand = [];
*/			
			answerInput.value = "Err"; //Error
		}

	
//		arrayOperator.push(sOperator);
//		arrayOperand.push(sCurrOperand);
//		sCurrOperand="";
		
		//TODO: -add: check if parenthesis sequence is correct; 
		//otherwise, ERROR
		//note: parenthesis can also function as multiply
	}
  
	
  
  </script>
